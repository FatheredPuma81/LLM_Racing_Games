<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Racing Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #87CEEB; }
        #hud {
            position: fixed; top: 20px; right: 20px;
            color: white; font-family: Arial, sans-serif; font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.3); padding: 15px 20px; border-radius: 10px;
        }
        #speedometer {
            position: fixed; bottom: 20px; right: 20px;
            color: white; font-family: Arial, sans-serif; font-size: 32px; font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.3); padding: 15px 25px; border-radius: 10px;
        }
        #speedValue { color: #ffcc00; }
    </style>
</head>
<body>
    <div id="hud">Lap: <span id="lapCount">0</span></div>
    <div id="speedometer"><span id="speedValue">0</span> km/h</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const FIXED_TIMESTEP = 1/60;
        
        // Physics constants - heavily tuned for realistic handling
        const ACCELERATION = 0.2;
        const MAX_SPEED = 1.2;
        const BRAKING = 0.2;
        const TURN_SPEED = 0.05;
        const FRICTION = 0.94;
        const LATERAL_GRIP = 0.85;
        const TRACTION = 0.92;
        
        // Track dimensions - larger track
        const TRACK_INNER = 45;
        const TRACK_OUTER = 75;
        
        let accumulator = 0;
        let lastTime = performance.now();
        let lapCount = 0;
        let checkpoints = [false, false, false];
        
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
        const car = { x: (TRACK_INNER + TRACK_OUTER) / 2, y: 0, z: 0, angle: 0, speed: 0 };
        
        let scene, camera, renderer, carMesh, frontWheels = [];
        
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 80, 200);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 100, 50);
            dirLight.castShadow = true;
            dirLight.shadow.camera.left = -100;
            dirLight.shadow.camera.right = 100;
            dirLight.shadow.camera.top = 100;
            dirLight.shadow.camera.bottom = -100;
            scene.add(dirLight);
            
            createTrack();
            createCar();
            setupInput();
            window.addEventListener('resize', onWindowResize);
        }
        
        function createTrack() {
            // Grass ground
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(300, 300),
                new THREE.MeshLambertMaterial({ color: 0x3d7d3d })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Track ring (asphalt)
            const track = new THREE.Mesh(
                new THREE.RingGeometry(TRACK_INNER, TRACK_OUTER, 64),
                new THREE.MeshLambertMaterial({ color: 0x3a3a3a, side: THREE.DoubleSide })
            );
            track.rotation.x = -Math.PI / 2;
            track.position.y = 0.02;
            track.receiveShadow = true;
            scene.add(track);
            
            // Inner wall
            const innerWall = new THREE.Mesh(
                new THREE.CylinderGeometry(TRACK_INNER, TRACK_INNER, 1, 64),
                new THREE.MeshLambertMaterial({ color: 0xcc3333 })
            );
            innerWall.position.y = 0.5;
            innerWall.castShadow = true;
            scene.add(innerWall);
            
            // Outer wall
            const outerWall = new THREE.Mesh(
                new THREE.CylinderGeometry(TRACK_OUTER, TRACK_OUTER, 1, 64),
                new THREE.MeshLambertMaterial({ color: 0xcc3333 })
            );
            outerWall.position.y = 0.5;
            outerWall.castShadow = true;
            scene.add(outerWall);
            
            // Start/finish line at track center radius
            const startRadius = (TRACK_INNER + TRACK_OUTER) / 2;
            const startLine = new THREE.Mesh(
                new THREE.PlaneGeometry(30, 3),
                new THREE.MeshLambertMaterial({ color: 0xffffff })
            );
            startLine.rotation.x = -Math.PI / 2;
            startLine.position.set(startRadius, 0.08, 0);
            scene.add(startLine);
            
            // Checkered pattern
            for (let i = 0; i < 12; i++) {
                const checker = new THREE.Mesh(
                    new THREE.PlaneGeometry(3, 1.4),
                    new THREE.MeshLambertMaterial({ color: i % 2 === 0 ? 0x000000 : 0xffffff })
                );
                checker.rotation.x = -Math.PI / 2;
                checker.position.set(startRadius - 3 * i, 0.1, 0);
                scene.add(checker);
            }
            
            // Trees
            for (let i = 0; i < 20; i++) {
                const angle = (i / 20) * Math.PI * 2;
                const radius = TRACK_OUTER + 15 + Math.random() * 15;
                const tx = Math.sin(angle) * radius;
                const tz = Math.cos(angle) * radius;
                
                const trunk = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.8, 1, 3, 8),
                    new THREE.MeshLambertMaterial({ color: 0x4a3728 })
                );
                trunk.position.set(tx, 1.5, tz);
                trunk.castShadow = true;
                scene.add(trunk);
                
                const foliage = new THREE.Mesh(
                    new THREE.ConeGeometry(3, 6, 8),
                    new THREE.MeshLambertMaterial({ color: 0x1a4d1a })
                );
                foliage.position.set(tx, 5, tz);
                foliage.castShadow = true;
                scene.add(foliage);
            }
        }
        
        function createCar() {
            carMesh = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2.5, 0.8, 4.5),
                new THREE.MeshLambertMaterial({ color: 0xff3333 })
            );
            body.position.y = 0.8;
            body.castShadow = true;
            carMesh.add(body);
            
            // Cabin
            const cabin = new THREE.Mesh(
                new THREE.BoxGeometry(2, 0.7, 2.5),
                new THREE.MeshLambertMaterial({ color: 0x222222 })
            );
            cabin.position.y = 1.5;
            cabin.position.z = -0.3;
            cabin.castShadow = true;
            carMesh.add(cabin);
            
            // Wheels
            const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 16);
            const wheelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
            [[1.3, 1.4], [-1.3, 1.4], [1.3, -1.4], [-1.3, -1.4]].forEach((pos, i) => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(pos[0], 0.5, pos[1]);
                wheel.castShadow = true;
                carMesh.add(wheel);
                if (i < 2) frontWheels.push(wheel);
            });
            
            // Headlights
            const hl1 = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshLambertMaterial({ color: 0xffffee }));
            hl1.position.set(0.7, 0.8, 2.3);
            carMesh.add(hl1);
            const hl2 = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshLambertMaterial({ color: 0xffffee }));
            hl2.position.set(-0.7, 0.8, 2.3);
            carMesh.add(hl2);
            
            // Taillights
            const tl1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.15), new THREE.MeshLambertMaterial({ color: 0xff0000 }));
            tl1.position.set(0.7, 0.8, -2.3);
            carMesh.add(tl1);
            const tl2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.15), new THREE.MeshLambertMaterial({ color: 0xff0000 }));
            tl2.position.set(-0.7, 0.8, -2.3);
            carMesh.add(tl2);
            
            carMesh.position.set(car.x, car.y, car.z);
            carMesh.rotation.y = -car.angle;
            scene.add(carMesh);
        }
        
        function setupInput() {
            document.addEventListener('keydown', e => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
            document.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });
        }
        
        function updatePhysics() {
            const accelerating = keys.w || keys.ArrowUp;
            const braking = keys.s || keys.ArrowDown;
            const turnLeft = keys.a || keys.ArrowLeft;
            const turnRight = keys.d || keys.ArrowRight;
            
            if (accelerating) car.speed += ACCELERATION;
            if (braking) car.speed -= BRAKING;
            car.speed *= FRICTION;
            if (Math.abs(car.speed) < 0.001) car.speed = 0;
            car.speed = Math.max(-MAX_SPEED/3, Math.min(MAX_SPEED, car.speed));
            
           // Turn only when moving - fixing reverse steering and adding grip
                if (Math.abs(car.speed) > 0.01) {
                    const speedRatio = Math.abs(car.speed) / MAX_SPEED;
                    let turnAmount = TURN_SPEED * speedRatio;
                    
                    // Limit turning at very low speeds to prevent spinning in place
                    if (speedRatio < 0.3) {
                        turnAmount *= (speedRatio / 0.3);
                    }
                    
                    // When reversing, steering should be opposite for proper feel
                    if (car.speed < 0) {
                        if (turnLeft) car.angle += turnAmount;
                        if (turnRight) car.angle -= turnAmount;
                    } else {
                        if (turnLeft) car.angle += turnAmount;
                        if (turnRight) car.angle -= turnAmount;
                    }
                }
            
            // Apply traction limit to reduce sliding
            let effectiveSpeed = car.speed * TRACTION;
            
            // Calculate current velocity components for lateral grip
            const targetX = car.x + Math.sin(car.angle) * car.speed;
            const targetZ = car.z + Math.cos(car.angle) * car.speed;
            
            // Apply lateral grip - blend current position to reduce sliding
            car.x += (targetX - car.x) * LATERAL_GRIP;
            car.z += (targetZ - car.z) * LATERAL_GRIP;
            
            // Boundaries - adjusted for new track size
            const dist = Math.sqrt(car.x * car.x + car.z * car.z);
            if (dist < TRACK_INNER) {
                const angle = Math.atan2(car.x, car.z);
                car.x = Math.sin(angle) * TRACK_INNER;
                car.z = Math.cos(angle) * TRACK_INNER;
                car.speed *= 0.5;
            } else if (dist > TRACK_OUTER) {
                const angle = Math.atan2(car.x, car.z);
                car.x = Math.sin(angle) * TRACK_OUTER;
                car.z = Math.cos(angle) * TRACK_OUTER;
                car.speed *= 0.5;
            }
            
            // Checkpoints - updated for track layout (start line at angle 0 on +x axis)
            const trackAngle = Math.atan2(car.x, car.z);
            const normAngle = ((trackAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            
            // Checkpoint zones around the circle
            if (normAngle > 1.0 && normAngle < 2.5 && !checkpoints[0]) checkpoints[0] = true;
            else if (normAngle > 2.8 && normAngle < 4.2 && !checkpoints[1]) checkpoints[1] = true;
            else if (normAngle > 4.5 && normAngle < 6.0 && !checkpoints[2]) checkpoints[2] = true;
            
            if ((normAngle < 1.0 || normAngle > 6.0) && checkpoints[0] && checkpoints[1] && checkpoints[2]) {
                lapCount++;
                document.getElementById('lapCount').textContent = lapCount;
                checkpoints = [false, false, false];
            }
            
            // Update car mesh
            carMesh.position.set(car.x, car.y, car.z);
            carMesh.rotation.y = -car.angle;
            
            // Front wheel steering visual
            if (turnLeft) frontWheels.forEach(w => w.rotation.y = Math.min(w.rotation.y + 0.1, 0.5));
            else if (turnRight) frontWheels.forEach(w => w.rotation.y = Math.max(w.rotation.y - 0.1, -0.5));
            else frontWheels.forEach(w => w.rotation.y *= 0.8);
        }
        
        function updateCamera() {
            const camDist = 20;
            const camHeight = 10;
            
            const targetX = car.x - Math.sin(car.angle) * camDist;
            const targetY = car.y + camHeight;
            const targetZ = car.z - Math.cos(car.angle) * camDist;
            
            camera.position.x += (targetX - camera.position.x) * 0.15;
            camera.position.y += (targetY - camera.position.y) * 0.15;
            camera.position.z += (targetZ - camera.position.z) * 0.15;
            
            camera.lookAt(car.x + Math.sin(car.angle) * 8, car.y + 0.5, car.z + Math.cos(car.angle) * 8);
        }
        
        function updateHUD() {
            document.getElementById('speedValue').textContent = Math.abs(Math.round(car.speed * 120));
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function gameLoop() {
            requestAnimationFrame(gameLoop);
            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;
            accumulator += dt;
            
            while (accumulator >= FIXED_TIMESTEP) {
                updatePhysics();
                accumulator -= FIXED_TIMESTEP;
            }
            
            updateCamera();
            updateHUD();
            renderer.render(scene, camera);
        }
        
        init();
        gameLoop();
    </script>
</body>
</html>
