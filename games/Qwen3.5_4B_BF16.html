<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Racing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
        }
        
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #lap-counter {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        #speedometer {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        #speed-value {
            font-size: 48px;
            font-weight: bold;
            color: #ff6b35;
        }
        
        #speed-label {
            font-size: 16px;
            color: #aaa;
        }
        
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="lap-counter">Lap: 1/3</div>
    <div id="speedometer">
        <div id="speed-value">0</div>
        <div id="speed-label">KM/H</div>
    </div>
    <div id="controls-hint">WASD or ARROWS to drive | R to reset</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ==================== CONFIGURATION ====================
        const CONFIG = {
            physics: {
                acceleration: 0.5,
                braking: 1.0,
                maxSpeed: 30,
                friction: 0.97,
                turnSpeed: 0.03
            },
            camera: {
                offsetDistance: 20,
                offsetHeight: 8,
                smoothness: 0.05
            },
            track: {
                radius: 250,
                width: 40,
                numLaps: 3,
                boundaryMargin: 50
            }
        };

        // ==================== GLOBALS ====================
        let scene, camera, renderer;
        let car, trackMesh, trackCurve;
        let checkpoints = [];
        let checkpointsCompleted = 0;
        
        // Car state
        let carVelocities = { x: 0, z: 0 };
        let carInputs = { w: 0, a: 0, s: 0, d: 0 };
        let lastInput = { w: 0, a: 0, s: 0, d: 0 };
        let currentLap = 1;
        let carPosition = new THREE.Vector3(0, 0, 0);
        
        // Physics
        let physicsStep = 1 / 60;
        let accumulator = 0;
        let lastTime = performance.now();
        
        // ==================== INITIALIZATION ====================
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 100, 600);
            
            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('game-container').appendChild(renderer.domElement);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x88ccff, 0.8);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(100, 150, 50);
            scene.add(dirLight);
            
            // Create world
            createGround();
            createTrack();
            createCar();
            createCheckpoints();
            
            // Event listeners
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            
            // Start loop
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }
        
        // ==================== GROUND ====================
        function createGround() {
            const geometry = new THREE.PlaneGeometry(5000, 5000);
            const material = new THREE.MeshLambertMaterial({ color: 0x3a5f0b });
            const ground = new THREE.Mesh(geometry, material);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);
        }
        
        // ==================== TRACK ====================
        function createTrack() {
            // Create oval track
            const points = [];
            const segments = 40;
            for (let i = 0; i <= segments; i++) {
                const t = i / segments;
                const angle = t * Math.PI * 2;
                points.push(new THREE.Vector3(
                    Math.cos(angle) * CONFIG.track.radius,
                    0,
                    Math.sin(angle) * CONFIG.track.radius
                ));
            }
            
            trackCurve = new THREE.CatmullRomCurve3(points, true, true, 'catmullrom');
            trackCurve.tension = 0.5;
            
            // Track surface
            const trackGeometry = new THREE.TubeGeometry(trackCurve, 100, CONFIG.track.width / 2, 4, false);
            const trackMaterial = new THREE.MeshLambertMaterial({ color: 0x333333 });
            trackMesh = new THREE.Mesh(trackGeometry, trackMaterial);
            scene.add(trackMesh);
            
            // Lane marker
            const laneGeometry = new THREE.TubeGeometry(trackCurve, 100, 2, 4, false);
            const laneMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const laneMarker = new THREE.Mesh(laneGeometry, laneMaterial);
            scene.add(laneMarker);
            
            // Boundaries (invisible)
            const boundaryGeometry = new THREE.BoxGeometry(500, 1, 500);
            const boundaryMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xff0000, 
                transparent: true, 
                opacity: 0.05 
            });
            const boundary = new THREE.Mesh(boundaryGeometry, boundaryMaterial);
            boundary.rotation.x = -Math.PI / 2;
            boundary.position.y = 0.01;
            scene.add(boundary);
            
            // Visual walls
            const wallGeometry = new THREE.BoxGeometry(500, 2, 500);
            const wallMaterial = new THREE.MeshPhongMaterial({ color: 0x888888 });
            
            const innerWall = new THREE.Mesh(wallGeometry, wallMaterial);
            innerWall.position.set(0, 1, 0);
            innerWall.rotation.x = -Math.PI / 2;
            innerWall.rotation.z = Math.PI / 2;
            innerWall.position.y = CONFIG.track.radius + CONFIG.track.boundaryMargin;
            scene.add(innerWall);
            
            const outerWall = new THREE.Mesh(wallGeometry, wallMaterial);
            outerWall.position.set(0, 1, 0);
            outerWall.rotation.x = -Math.PI / 2;
            outerWall.rotation.z = -Math.PI / 2;
            outerWall.position.y = CONFIG.track.radius + CONFIG.track.boundaryMargin;
            scene.add(outerWall);
        }
        
        // ==================== CAR ====================
        function createCar() {
            car = new THREE.Group();
            
            // Body
            const bodyGeometry = new THREE.BoxGeometry(2, 1, 4);
            const bodyMaterial = new THREE.MeshLambertMaterial({ color: 0xff0000 });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 0.5;
            car.add(body);
            
            // Cabin
            const cabinGeometry = new THREE.BoxGeometry(1.5, 0.5, 1.4);
            const cabinMaterial = new THREE.MeshLambertMaterial({ color: 0x333333 });
            const cabin = new THREE.Mesh(cabinGeometry, cabinMaterial);
            cabin.position.y = 0.9;
            cabin.position.z = 0;
            car.add(cabin);
            
            // Wheels
            const wheelGeometry = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 16);
            const wheelMaterial = new THREE.MeshLambertMaterial({ color: 0x111111 });
            
            const wheelPositions = [
                { x: 1.1, z: 1.2 },
                { x: -1.1, z: 1.2 },
                { x: 1.1, z: -1.2 },
                { x: -1.1, z: -1.2 }
            ];
            
            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(pos.x, 0.5, pos.z);
                car.add(wheel);
            });
            
            // Headlights
            const lightGeometry = new THREE.BoxGeometry(0.4, 0.3, 0.2);
            const lightMaterial = new THREE.MeshBasicMaterial({ color: 0xffffee });
            const leftLight = new THREE.Mesh(lightGeometry, lightMaterial);
            leftLight.position.set(-0.6, 0.6, -2);
            car.add(leftLight);
            
            const rightLight = new THREE.Mesh(lightGeometry, lightMaterial);
            rightLight.position.set(0.6, 0.6, -2);
            car.add(rightLight);
            
            // Taillights (smaller, positioned correctly)
            const tailLightGeometry = new THREE.BoxGeometry(0.2, 0.15, 0.05);
            const tailLightMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const leftTail = new THREE.Mesh(tailLightGeometry, tailLightMaterial);
            leftTail.position.set(-0.35, 0.45, 2.05);
            car.add(leftTail);
            
            const rightTail = new THREE.Mesh(tailLightGeometry, tailLightMaterial);
            rightTail.position.set(0.35, 0.45, 2.05);
            car.add(rightTail);
            
            // Lights
            const headLightL = new THREE.PointLight(0xffffee, 1, 50);
            headLightL.position.set(-0.6, 0.6, -2);
            car.add(headLightL);
            
            const headLightR = new THREE.PointLight(0xffffee, 1, 50);
            headLightR.position.set(0.6, 0.6, -2);
            car.add(headLightR);
            
            scene.add(car);
        }
        
        // ==================== CHECKPOINTS ====================
        function createCheckpoints() {
            const checkpointColors = [0x00ff88, 0xff6b35, 0x0066ff, 0xffcc00, 0xff00ff, 0x00ffff];
            
            for (let i = 0; i < 8; i++) {
                const geometry = new THREE.CylinderGeometry(3, 3, 1, 16);
                const material = new THREE.MeshLambertMaterial({ color: checkpointColors[i % checkpointColors.length] });
                const checkpoint = new THREE.Mesh(geometry, material);
                
                const point = trackCurve.getPointAt((i + 1) / 8);
                checkpoint.position.copy(point);
                checkpoint.position.y = 0.5;
                
                // Cone
                const coneGeometry = new THREE.ConeGeometry(3, 2, 16);
                const cone = new THREE.Mesh(coneGeometry, material);
                cone.position.copy(checkpoint.position);
                cone.rotation.y = Math.PI / 4;
                cone.position.y = 1.5;
                scene.add(cone);
                
                checkpoints.push(checkpoint);
            }
        }
        
        // ==================== INPUT ====================
        function onKeyDown(event) {
            switch(event.code) {
                case 'KeyW': case 'ArrowUp': carInputs.w = 1; break;
                case 'KeyS': case 'ArrowDown': carInputs.s = 1; break;
                case 'KeyA': case 'ArrowLeft': carInputs.a = 1; break;
                case 'KeyD': case 'ArrowRight': carInputs.d = 1; break;
                case 'KeyR': resetCarPosition(); break;
            }
        }
        
        function onKeyUp(event) {
            switch(event.code) {
                case 'KeyW': case 'ArrowUp': carInputs.w = 0; break;
                case 'KeyS': case 'ArrowDown': carInputs.s = 0; break;
                case 'KeyA': case 'ArrowLeft': carInputs.a = 0; break;
                case 'KeyD': case 'ArrowRight': carInputs.d = 0; break;
            }
        }
        
        function resetCarPosition() {
            const startPos = trackCurve.getPointAt(0);
            car.position.copy(startPos);
            car.position.y = 0;
            car.rotation.set(0, 0, 0);
            carVelocities.x = 0;
            carVelocities.z = 0;
            currentLap = 1;
            checkpointsCompleted = 0;
            updateLapDisplay();
        }
        
        // ==================== PHYSICS ====================
        function updatePhysics(dt) {
            lastInput = { ...carInputs };
            
            // Acceleration
            if (lastInput.w) {
                carVelocities.x += CONFIG.physics.acceleration * dt;
                carVelocities.z -= CONFIG.physics.acceleration * dt;
            }
            if (lastInput.s) {
                carVelocities.x -= CONFIG.physics.acceleration * dt;
                carVelocities.z += CONFIG.physics.acceleration * dt;
            }
            
            // Steering
            if (lastInput.a) {
                car.rotation.y += CONFIG.physics.turnSpeed * dt;
            }
            if (lastInput.d) {
                car.rotation.y -= CONFIG.physics.turnSpeed * dt;
            }
            
            // Friction
            carVelocities.x *= CONFIG.physics.friction;
            carVelocities.z *= CONFIG.physics.friction;
            
            // Cap max speed
            const currentSpeed = Math.sqrt(carVelocities.x * carVelocities.x + carVelocities.z * carVelocities.z);
            if (currentSpeed > CONFIG.physics.maxSpeed) {
                const scale = CONFIG.physics.maxSpeed / currentSpeed;
                carVelocities.x *= scale;
                carVelocities.z *= scale;
            }
            
            // Apply movement
            car.position.x += carVelocities.x * dt;
            car.position.z += carVelocities.z * dt;
            
            // Boundary check
            checkBoundaries();
            
            // Face direction of travel
            const direction = new THREE.Vector3(carVelocities.x, 0, carVelocities.z);
            direction.normalize();
            car.rotation.y = Math.atan2(direction.x, direction.z);
        }
        
        function checkBoundaries() {
            // Only apply boundary checks when car is moving fast
            const speed = Math.sqrt(carVelocities.x * carVelocities.x + carVelocities.z * carVelocities.z);
            if (speed < 5) {
                return;
            }
            
            // Check center distance
            const carToCenter = car.position.length();
            const trackCenterRadius = CONFIG.track.radius;
            
            if (carToCenter > trackCenterRadius + CONFIG.track.boundaryMargin) {
                const direction = car.position.clone().normalize();
                car.position.x -= direction.x * CONFIG.track.boundaryMargin;
                car.position.z -= direction.z * CONFIG.track.boundaryMargin;
                carVelocities.x *= 0.8;
                carVelocities.z *= 0.8;
            }
            
            // Check distance to track
            const boundaryPoints = [];
            const numSamples = 30;
            for (let i = 0; i <= numSamples; i++) {
                boundaryPoints.push(trackCurve.getPointAt(i / numSamples));
            }
            
            let closestPoint = boundaryPoints[0];
            let minDistance = car.position.distanceTo(boundaryPoints[0]);
            
            for (let i = 1; i < boundaryPoints.length; i++) {
                const dist = car.position.distanceTo(boundaryPoints[i]);
                if (dist < minDistance) {
                    minDistance = dist;
                    closestPoint = boundaryPoints[i];
                }
            }
            
            const distanceToTrack = minDistance;
            const halfTrackWidth = CONFIG.track.width / 2;
            
            if (distanceToTrack > halfTrackWidth + CONFIG.track.boundaryMargin) {
                const direction = closestPoint.clone().sub(car.position).normalize();
                car.position.x += direction.x * CONFIG.track.boundaryMargin;
                car.position.z += direction.z * CONFIG.track.boundaryMargin;
                carVelocities.x *= 0.8;
                carVelocities.z *= 0.8;
            }
        }
        
        // ==================== CAMERA ====================
        function updateCamera() {
            const targetPosition = car.position.clone();
            targetPosition.y = car.position.y + CONFIG.camera.offsetHeight;
            targetPosition.add(car.position.clone().multiplyScalar(CONFIG.camera.offsetDistance));
            
            camera.position.lerp(targetPosition, CONFIG.camera.smoothness);
            const lookAtPosition = car.position.clone();
            lookAtPosition.y += 3;
            camera.lookAt(lookAtPosition);
        }
        
        // ==================== LAPS ====================
        function checkLaps() {
            // Only check laps when car is actually moving on track
            const speed = Math.sqrt(carVelocities.x * carVelocities.x + carVelocities.z * carVelocities.z);
            if (speed < 0.5) {
                return;
            }
            
            checkpoints.forEach(checkpoint => {
                const dist = car.position.distanceTo(checkpoint.position);
                if (dist < 8) {
                    checkpointsCompleted++;
                    if (checkpointsCompleted >= CONFIG.track.numLaps) {
                        checkpointsCompleted = 0;
                        currentLap++;
                        if (currentLap > CONFIG.track.numLaps) {
                            currentLap = 1;
                        }
                    }
                }
            });
            updateLapDisplay();
        }
        
        function updateLapDisplay() {
            const displayLaps = Math.min(currentLap, CONFIG.track.numLaps);
            document.getElementById('lap-counter').textContent = `Lap: ${displayLaps}/${CONFIG.track.numLaps}`;
        }
        
        function updateSpeed() {
            let speed = Math.sqrt(carVelocities.x * carVelocities.x + carVelocities.z * carVelocities.z);
            speed = Math.min(speed, CONFIG.physics.maxSpeed);
            speed = Math.round(speed * 1.5);
            document.getElementById('speed-value').textContent = speed;
        }
        
        // ==================== GAME LOOP ====================
        function gameLoop() {
            const currentTime = performance.now();
            const dt = Math.min((currentTime - lastTime) / 1000, 0.1);
            lastTime = currentTime;
            
            // Fixed timestep
            while (accumulator + dt >= physicsStep) {
                updatePhysics(physicsStep);
                accumulator -= physicsStep;
            }
            
            updateCamera();
            updateSpeed();
            checkLaps();
            
            renderer.render(scene, camera);
            
            accumulator += dt;
            
            if (accumulator > physicsStep) {
                updatePhysics(accumulator);
                accumulator = 0;
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        init();
    </script>
</body>
</html>
